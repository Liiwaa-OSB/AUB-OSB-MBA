<!-- Count Animation Code - START -->
<script>
(function () {
  const counters = document.querySelectorAll('.count');

  const animate = (el) => {
    const start = Number(el.dataset.start || 0);
    const target = Number(el.dataset.target);
    const duration = Number(el.dataset.duration || 1500);
    const startTime = performance.now();

    const update = (now) => {
      const progress = Math.min((now - startTime) / duration, 1);
      const value = start + (target - start) * progress;
      el.textContent = Math.round(value);

      if (progress < 1) requestAnimationFrame(update);
    };

    requestAnimationFrame(update);
  };

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        animate(entry.target);
        observer.unobserve(entry.target);
      }
    });
  });

  counters.forEach(el => observer.observe(el));
})();
</script>
<!-- Count Animation Code - END -->
<!-- Newsletter POPUP - START -->
<script>
document.addEventListener("DOMContentLoaded", function () {

  const popup = document.querySelector(".OSBD-newsletter-popup");
  if (!popup) return;

  const TWO_WEEKS = 14 * 24 * 60 * 60 * 1000;

  function showPopup() {
    popup.classList.add("osbd-active");
  }

  function hidePopup() {
    popup.classList.remove("osbd-active");
  }

  /* Storage checks */
  const hideUntil = localStorage.getItem("osbd_hide_until");
  const hideForever = localStorage.getItem("osbd_hide_forever");

  if (hideForever) return;
  if (hideUntil && Date.now() < hideUntil) return;

  /* Open after delay */
  setTimeout(showPopup, 4000);

  /* Close when clicking outside popup */
  document.addEventListener("click", function (e) {
    if (!popup.contains(e.target) && popup.classList.contains("osbd-active")) {
      hidePopup();
    }
  });
  /* Buttons INSIDE the block (no HTML changes needed) */
  popup.querySelectorAll("button").forEach(btn => {
    if (btn.textContent.toLowerCase().includes("later")) {
      btn.addEventListener("click", function () {
        localStorage.setItem("osbd_hide_until", Date.now() + TWO_WEEKS);
        hidePopup();
      });
    }
    if (btn.textContent.toLowerCase().includes("no")) {
      btn.addEventListener("click", function () {
        localStorage.setItem("osbd_hide_forever", "1");
        hidePopup();
      });
    }
  });
  /* Email submit → hide forever */
  const form = popup.querySelector("form");
  if (form) {
    form.addEventListener("submit", function () {
      localStorage.setItem("osbd_hide_forever", "1");
    });
  }
  /* Close button (X) */
  const closeBtn = popup.querySelector(".osbd-x");
  if (closeBtn) {
    closeBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      hidePopup();
    });
  }
});
</script>
<!-- Newsletter POPUP - END -->
