    <style>
        /* Section: centered, max width 1400px */
        .logo-section {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        /* Logo row: uses full width of section */
        .logo-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            width: 100%;
            gap: 1rem;
            padding: 30px;
        }

        /* Each logo container takes equal width */
        .logo-item {
            flex: 1;
            text-align: center;
            box-sizing: border-box;
        }

        /* Image takes full width of its container, height auto (natural aspect ratio) */
        .logo-item img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>

<body>
    <div class="logo-section">
        <div class="logo-row">
            <div class="logo-item">
                <img src="images/OSBD-AACSB-logo.jpg" alt="AACSB Logo">
            </div>
            <div class="logo-item">
                <img src="images/OSBD-ACCA-logo.jpg" alt="ACCA Logo">
            </div>
            <div class="logo-item">
                <img src="images/OSBD-BSIS-logo.jpg" alt="BSIS Logo">
            </div>
            <div class="logo-item">
                <img src="images/OSBD-SHRM-logo.jpg" alt="SHRM Logo">
            </div>
        </div>
    </div>
</body>
